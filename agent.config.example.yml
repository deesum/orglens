scoring:
  weights:
    security: 0.3
    maintainability: 0.25
    reliability: 0.2
    performance: 0.15
    operability: 0.1
  severityPoints:
    critical: 25
    high: 15
    medium: 8
    low: 3
  ciGate:
    failBelow: 70
    warnBelow: 80
priority:
  blastRadiusWeight: 0.5
  severityWeight: 0.35
  effortWeight: 0.15
suppression:
  rules: []
ruleOverrides:
  # Rule names to exclude entirely from findings and scoring.
  # Run `orglens rules --repo <path>` to see every rule detected in your project.
  disabled: []
  # Override a rule's default severity. Allowed values: critical | high | medium | low.
  # Example:
  #   severity:
  #     ApexDoc: low
  #     ApexCRUDViolation: critical
  severity: {}
llm:
  enabled: true
  provider: openai
  openaiModel: gpt-4.1-mini
  anthropicModel: claude-3-5-sonnet-latest
  maxRecommendations: 10
  redactionEnabled: true
governance:
  snapshotDir: .cre-snapshots
ownership:
  # Owner assigned when no rule matches a finding's file path.
  defaultOwner: Unassigned
  # First matching glob wins. Patterns are matched against the file path
  # (use ** for any path segments, * for a single segment).
  rules:
    - pattern: "**/lwc/**"
      owner: Frontend Guild
    - pattern: "**/classes/**"
      owner: Platform Core
    - pattern: "**/flows/**"
      owner: Automation Team
roadmap:
  # Effort capacity (in points) packed into each suggested sprint.
  sprintCapacityPoints: 10
  # Story points assigned to each effort size.
  effortPoints:
    S: 1
    M: 3
    L: 8
