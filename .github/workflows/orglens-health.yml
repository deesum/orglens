# OrgLens health gate + PR comment bot.
#
# Template: adapt `PROJECT_PATH` to point at the Salesforce project you want to
# scan (this can be the same repo, or use actions/checkout to pull another repo).
# Requires the OrgLens CLI to be available; here we build it from this repo.
name: OrgLens Health

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Path to the Salesforce project to analyze (defaults to repo root).
      PROJECT_PATH: "."
      # Fail the check if the health score drops below this threshold.
      THRESHOLD: "70"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build OrgLens
        run: |
          npm ci
          npm run build

      - name: Run OrgLens analysis
        run: |
          node dist/cli.js analyze \
            --repo "$PROJECT_PATH" \
            --format json \
            --out orglens-report.json \
            --mode ci \
            --threshold "$THRESHOLD" \
            --summary-out orglens-summary.md
        continue-on-error: true
        id: analyze

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: orglens-report
          path: |
            orglens-report.json
            orglens-summary.md

      - name: Comment health summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('orglens-summary.md')) return;
            const body = fs.readFileSync('orglens-summary.md', 'utf8');
            const marker = '<!-- orglens-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            const finalBody = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: finalBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: finalBody });
            }

      - name: Enforce threshold
        if: steps.analyze.outcome == 'failure'
        run: |
          echo "OrgLens health score is below the configured threshold ($THRESHOLD)."
          exit 1
